name: Run Tests
description: Runs tests on a specified environment

inputs:
  env:
    required: true

runs:
  using: "composite"
  steps:
    - name: Checkout pipeline repo
      uses: actions/checkout@v4

    - name: Clone test repo
      shell: cmd
      run: |
        git clone https://github.com/mtararujs/python-greetings.git python-greetings

    - name: Install npm deps
      shell: cmd
      working-directory: tests
      run: |
        echo "Installing npm dependencies..."
        npm install

    - name: Run tests
      shell: cmd
      working-directory: tests
      run: |
        echo "Running tests on ${{ inputs.env }}..."
        npm run greetings greetings_${{ inputs.env }}