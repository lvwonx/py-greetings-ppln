name: Test Pipeline

on:
  push:
    branches: [ main ]

jobs:
  install-pip-deps:
    runs-on: self-hosted
    steps:
      - name: Checkout pipeline repo
        uses: actions/checkout@v4

      - name: Clone python-greetings
        uses: ./.github/actions/install-deps
        with:
          repository: mtararujs/python-greetings
          path: python-greetings

      - name: Install dependencies
        working-directory: python-greetings
        run: |
          echo "Installing dependencies..."
          python3 -m venv venv
          ./venv/bin/python -m pip install -r requirements.txt

  deploy-to-dev:
    runs-on: self-hosted
    needs: install-pip-deps
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/deploy
        with:
          repository: mtararujs/python-greetings
          path: python-greetings
          env: dev

      - name: Deploy DEV
        working-directory: python-greetings
        run: |
          echo "Deploying to DEV..."
          pm2 delete greetings-app-dev || true

          pm2 start app.py \
            --name greetings-app-dev \
            --interpreter ./venv/bin/python \
            -- --port=7001

  tests-on-dev:
    runs-on: self-hosted
    needs: deploy-to-dev
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/test
        with:
          repository: mtararujs/course-js-api-framework
          path: tests
          env: dev

      - name: Install npm
        working-directory: tests
        run: |
          echo "Installing npm deps..."
          npm install

      - name: Run tests
        working-directory: tests
        run: |
          echo "Running tests on DEV..."
          npm run greetings greetings_dev

  deploy-to-stg:
    runs-on: self-hosted
    needs: tests-on-dev
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/deploy
        with:
          repository: mtararujs/python-greetings
          path: python-greetings
          env: dev

      - name: Deploy STG
        working-directory: python-greetings
        run: |
          echo "Deploying to STG..."
          pm2 delete greetings-app-stg || true

          pm2 start app.py \
            --name greetings-app-stg \
            --interpreter ./venv/bin/python \
            -- --port=7002

  tests-on-stg:
    runs-on: self-hosted
    needs: deploy-to-stg
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/test
        with:
          repository: mtararujs/course-js-api-framework
          path: tests
          env: dev

      - name: Install npm deps
        working-directory: tests
        run: |
          echo "Installing npm dependencies..."
          npm install

      - name: Run tests
        working-directory: tests
        run: |
          echo "Running tests on STG..."
          npm run greetings greetings_stg

          deploy-to-preprod:

  deploy-to-preprod:
    runs-on: self-hosted
    needs: tests-on-stg
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/deploy
        with:
          repository: mtararujs/python-greetings
          path: python-greetings
          env: dev

      - name: Deploy PREPROD
        working-directory: python-greetings
        run: |
          echo "Deploying to PREPROD..."
          pm2 delete greetings-app-preprod || true

          pm2 start app.py \
            --name greetings-app-preprod \
            --interpreter ./venv/bin/python \
            -- --port=7003

  tests-on-preprod:
    runs-on: self-hosted
    needs: deploy-to-preprod
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/test
        with:
          repository: mtararujs/course-js-api-framework
          path: tests
          env: dev

      - name: Install npm deps
        working-directory: tests
        run: |
          echo "Installing npm dependencies..."
          npm install

      - name: Run tests
        working-directory: tests
        run: |
          echo "Running tests on PREPROD..."
          npm run greetings greetings_preprod

  deploy-to-prod:
    runs-on: self-hosted
    needs: tests-on-preprod
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/deploy
        with:
          repository: mtararujs/python-greetings
          path: python-greetings
          env: dev

      - name: Deploy PROD
        working-directory: python-greetings
        run: |
          echo "Deploying to PROD..."
          pm2 delete greetings-app-prod || true

          pm2 start app.py \
            --name greetings-app-prod \
            --interpreter ./venv/bin/python \
            -- --port=7004

  tests-on-prod:
    runs-on: self-hosted
    needs: deploy-to-prod
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/test
        with:
          repository: mtararujs/course-js-api-framework
          path: tests
          env: dev

      - name: Install npm deps
        working-directory: tests
        run: |
          echo "Installing npm dependencies..."
          npm install

      - name: Run tests
        working-directory: tests
        run: |
          echo "Running tests on PROD..."
          npm run greetings greetings_prod